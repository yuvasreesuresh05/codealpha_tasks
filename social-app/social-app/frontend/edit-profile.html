<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Edit Profile — MiniSocial</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-header"></div>

<main class="container">
  <a class="back-link" href="index.html">← Back to feed</a>
  <div class="card">
    <h1 style="margin-top:0;">Edit profile</h1>
    <div class="error-msg" id="form-error" style="display:none;"></div>
    <form id="edit-profile-form">
      <div class="form-group">
        <label for="bio">Bio</label>
        <textarea id="bio" maxlength="280" placeholder="Tell people about yourself"></textarea>
      </div>
      <div class="form-group">
        <label for="avatarUrl">Avatar URL</label>
        <input type="url" id="avatarUrl" placeholder="https://example.com/avatar.jpg">
      </div>
      <button type="submit">Save changes</button>
    </form>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/edit-profile.js"></script>
</body>
</html>
