<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Post — MiniSocial</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-header"></div>

<main class="container">
  <a class="back-link" href="index.html">← Back to feed</a>
  <div id="post-container"></div>

  <h3>Comments</h3>
  <form id="comment-form" style="display:none; gap:8px; margin-bottom:16px;">
    <textarea id="comment-text" placeholder="Write a comment..." maxlength="300" style="flex:1;"></textarea>
    <button type="submit">Reply</button>
  </form>
  <div id="comments-list"></div>
</main>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/post.js"></script>
</body>
</html>
