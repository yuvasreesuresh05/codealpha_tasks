<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign up — MiniSocial</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<div id="app-header"></div>

<main class="container">
  <div class="auth-card">
    <h1>Create account</h1>
    <div class="error-msg" id="form-error" style="display:none;"></div>
    <form id="register-form">
      <div class="form-group">
        <label for="username">Username</label>
        <input type="text" id="username" minlength="3" maxlength="30" required>
      </div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" required>
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" minlength="6" required>
      </div>
      <button type="submit" style="width:100%;">Sign up</button>
    </form>
    <div class="auth-switch">Already have an account? <a href="login.html">Log in</a></div>
  </div>
</main>

<script src="js/auth.js"></script>
<script src="js/api.js"></script>
<script src="js/main.js"></script>
<script src="js/register.js"></script>
</body>
</html>
